name: WASM CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          extra-substituters = https://cache.iog.io
          extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=

    - name: Build WASM binary
      run: |
        nix build .#wasm
        ls -lh result/cardano-addresses.wasm

    - name: Test WASM binary with wasmtime
      run: |
        nix shell 'gitlab:haskell-wasm/ghc-wasm-meta?host=gitlab.haskell.org#all_9_12' \
          --command bash -c "
            echo '{\"cmd\":\"inspect\",\"address\":\"stake1uyehkck0lajq8gr28t9uxnuvgcqrc6070x3k9r8048z8y5gh6ffgw\"}' | wasmtime result/cardano-addresses.wasm
            echo '{\"cmd\":\"derive\",\"mnemonic\":\"message mask aunt wheel ten maze between tomato slow analyst ladder such report capital produce\",\"path\":\"1852H/1815H/0H/0/0\"}' | wasmtime result/cardano-addresses.wasm | head -3
          "

    - name: Upload cardano-addresses WASM artifact
      uses: actions/upload-artifact@v4
      with:
        name: cardano-addresses-wasm
        path: result/cardano-addresses.wasm
        retention-days: 90

    - name: Upload inspect-address WASM artifact
      uses: actions/upload-artifact@v4
      with:
        name: inspect-address-wasm
        path: result/cardano-addresses.wasm
        retention-days: 90
