name: WASM CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          extra-substituters = https://cache.iog.io
          extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=

    - name: Cache WASM cabal store
      uses: actions/cache@v4
      with:
        path: ~/.ghc-wasm/.cabal/store
        key: wasm-cabal-store-${{ hashFiles('cabal-wasm.project', 'cardano-addresses.cabal') }}
        restore-keys: |
          wasm-cabal-store-

    - name: Get GHC WASM toolchain
      run: |
        nix shell 'gitlab:haskell-wasm/ghc-wasm-meta?host=gitlab.haskell.org#all_9_12' \
          --command bash -c "wasm32-wasi-ghc --version"

    - name: Update cabal index
      run: |
        nix shell 'gitlab:haskell-wasm/ghc-wasm-meta?host=gitlab.haskell.org#all_9_12' \
          --command bash -c "wasm32-wasi-cabal update"

    - name: Build cardano-addresses for WASM
      run: |
        nix shell 'gitlab:haskell-wasm/ghc-wasm-meta?host=gitlab.haskell.org#all_9_12' \
          --command bash -c "wasm32-wasi-cabal --project-file=cabal-wasm.project build cardano-addresses:lib:cardano-addresses"

    - name: Collect WASM artifacts
      run: |
        mkdir -p artifacts
        find dist-newstyle/build/wasm32-wasi -name "*.a" -path "*/cardano-addresses-*/build/*" \
          -exec cp {} artifacts/ \;
        ls -lh artifacts/

    - name: Upload WASM library
      uses: actions/upload-artifact@v4
      with:
        name: cardano-addresses-wasm
        path: artifacts/
        retention-days: 30
