name: Haskell CI

on:
  push:
    branches: [ "master" ]
    tags:
      - '*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.sys.os }}

    strategy:
      fail-fast: false
      matrix:
        ghc: ["9.6", "9.10", "9.12", "9.14"]
        cabal: ["3.14"]
        sys:
          - { os: windows-latest, shell: 'C:/msys64/usr/bin/bash.exe -e {0}' }
          - { os: ubuntu-latest, shell: bash }
        include:
          # Using include, to make sure there will only be one macOS job, even if the matrix gets expanded later on.
          # We want a single job, because macOS runners are scarce.
          - cabal: "3.12"
            ghc: "9.6"
            sys:
              os: macos-latest
              shell: bash

    defaults:
        run:
          shell: ${{ matrix.sys.shell }}

    steps:
    - name: Setting toolchain variables
      run: |
        echo "release-ghc=9.6" >> $GITHUB_ENV
        echo "CABAL_CACHE_VERSION=v1" >> $GITHUB_ENV

    - name: Install Haskell
      uses: input-output-hk/actions/haskell@latest
      id: setup-haskell
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - name: Install system dependencies
      uses: input-output-hk/actions/base@latest
      with:
        use-sodium-vrf: true

    - name: Checkout
      uses: actions/checkout@v4

    - name: Cabal update
      run: cabal update

    # A dry run `build all` operation does *NOT* download anything, it just looks at the package
    # indices to generate an install plan.
    - name: Build dry run
      run: cabal build all --enable-tests --dry-run --minimize-conflict-set

    - name: Record dependencies
      run: cat dist-newstyle/cache/plan.json | jq -r '."install-plan"[].id' | sort | uniq > dependencies.txt

    # From the install plan a dependency list is generated here.
    - name: Windows toolchain setup
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2

    # From the dependency list the cached dependencies is restored.
    # The hash of `dependencies.txt` is used as a part of the cache key because that will be stable
    # until the `index-state` values in the `cabal.project` file changes.
    - name: Restore cached dependencies
      uses: actions/cache/restore@v4
      id: cache
      with:
        path: |
          ${{ steps.setup-haskell.outputs.cabal-store }}
          dist-newstyle
        key: cache-${{ env.CABAL_CACHE_VERSION }}-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('dependencies.txt') }}

    # The dependencies are installed. If the cache is found and restored in the previous step,
    # this should be a no-op. If the cache key is not found the build assets are produced for the
    # caching in the next step.
    - name: Install dependencies
      run: cabal build all --enable-tests --only-dependencies -j --ghc-option=-j4

    # Always store the cabal cache.
    # This may benignly fail if the cache key is already populated.
    - name: Cache Cabal store
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ steps.setup-haskell.outputs.cabal-store }}
          dist-newstyle
        key: cache-${{ env.CABAL_CACHE_VERSION }}-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('dependencies.txt') }}

    - name: Build (Linux/Macos)
      if: runner.os != 'Windows'    
      run: cabal build all --enable-tests

    - name: Build Windows
      if: runner.os == 'Windows'
      run: cabal build all
  
    - name: Clean coverage data
      if: matrix.sys.os == 'ubuntu-latest' && matrix.ghc == '9.10'
      run: find . -name "*.tix" -delete 2>/dev/null || true

    - name: Run tests
      env:
        TMPDIR: ${{ runner.temp }}
        TMP: ${{ runner.temp }}
        KEEP_WORKSPACE: 1
        GHC_RTS_OPTS: --read-tix-file=no
      run: |
        if [ "${{ matrix.sys.os }}" == "ubuntu-latest" ] && [ "${{ matrix.ghc }}" == "9.10" ]; then
          cabal test all --enable-tests --enable-coverage --test-show-details=direct
        else
          cabal test all --enable-tests --test-show-details=direct
        fi

    - name: Running Haddock
      run: cabal haddock

    - name: Prepare Haddock artifact
      if: matrix.sys.os == 'ubuntu-latest' && matrix.ghc == '9.10'
      run: |
        mkdir -p haddock_artifacts
        echo "=== Finding haddock directories ==="
        find dist-newstyle -type d -path "*cardano-addresses*/doc/html" 2>/dev/null | head -5
        HADDOCK_DIR=$(find dist-newstyle -type d -path "*cardano-addresses*/doc/html" 2>/dev/null | head -1)
        echo "HADDOCK_DIR=$HADDOCK_DIR"
        if [ -n "$HADDOCK_DIR" ] && [ -d "$HADDOCK_DIR" ]; then
          cp -r "$HADDOCK_DIR" haddock_artifacts/html
          echo "=== Copied haddock, listing ==="
          ls -la haddock_artifacts/
          ls -la haddock_artifacts/html/ 2>/dev/null || true
        else
          echo "No haddock directory found for cardano-addresses"
          find dist-newstyle -type d -name "html" 2>/dev/null | head -5
        fi

    - name: Upload Haddock artifact
      if: matrix.sys.os == 'ubuntu-latest' && matrix.ghc == '9.10'
      uses: actions/upload-artifact@v4
      with:
        name: haddock-${{ matrix.ghc }}-${{ matrix.sys.os }}
        path: haddock_artifacts
        retention-days: 1

    - name: Generate Coverage Report
      if: matrix.sys.os == 'ubuntu-latest' && matrix.ghc == '9.10'
      run: |
        mkdir -p coverage_html badges

        HADDOCK_HTML=$(find dist-newstyle -name "index.html" -path "*cardano-addresses*/doc/html/*" 2>/dev/null | grep -v "mini" | head -1)
        if [ -n "$HADDOCK_HTML" ] && [ -f "$HADDOCK_HTML" ]; then
          HADDOCK_BADGE_URL="https://img.shields.io/badge/Hackage-OK-green?style=for-the-badge"
        else
          HADDOCK_BADGE_URL="https://img.shields.io/badge/Hackage-INVALID-red?style=for-the-badge"
        fi
        echo "Haddock Badge URL: $HADDOCK_BADGE_URL"
        curl -sL "$HADDOCK_BADGE_URL" -o badges/haddock-badge.svg

        HPC_HTML=$(find dist-newstyle -name "hpc_index.html" -path "*/hpc/vanilla/html/*" 2>/dev/null | head -1)
        echo "=== Found hpc_index.html: $HPC_HTML ==="
        if [ -n "$HPC_HTML" ] && [ -f "$HPC_HTML" ]; then
          cp "$HPC_HTML" coverage_html/
          
          sed -i 's|module ||g' coverage_html/hpc_index.html
          sed -i 's|cardano-addresses-[0-9.]*-||g; s|-inplace/||g; s|inplace/||g' coverage_html/hpc_index.html
          sed -i 's|href="\([^"]*\)inplace/\([^"]*\)"|href="\2"|g' coverage_html/hpc_index.html
          sed -i 's|href="\([^"]*\)"|href="https://github.com/IntersectMBO/cardano-addresses/blob/master/lib/\1"|g' coverage_html/hpc_index.html
          sed -i 's|\.hs\.html"|"|g' coverage_html/hpc_index.html
          for _ in $(seq 10); do sed -i 's|\(href="https://github.com/IntersectMBO/cardano-addresses/blob/master/lib/[^"]*\)\.\([^."]*\)|\1/\2|g' coverage_html/hpc_index.html 2>/dev/null || break; done
          sed -i 's|href="https://github.com/IntersectMBO/cardano-addresses/blob/master/lib/\([^"]*\)"|href="https://github.com/IntersectMBO/cardano-addresses/blob/master/lib/\1.hs"|g' coverage_html/hpc_index.html
          
          COVERAGE=$(grep -oP '\d+(?=%)' "$HPC_HTML" | head -1 || echo "N/A")
        else
          COVERAGE="N/A"
        fi
        echo "Coverage: $COVERAGE"
        if [ -n "$HPC_HTML" ] && [ -f "$HPC_HTML" ]; then
          BADGE_URL="https://img.shields.io/badge/Tests%20Coverage-OK-green?style=for-the-badge"
        else
          BADGE_URL="https://img.shields.io/badge/Tests%20Coverage-INVALID-red?style=for-the-badge"
        fi
        echo "Badge URL: $BADGE_URL"
        curl -sL "$BADGE_URL" -o badges/badge.svg

    - name: Upload Coverage artifact
      if: matrix.sys.os == 'ubuntu-latest' && matrix.ghc == '9.10'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.ghc }}-${{ matrix.sys.os }}
        path: |
          coverage_html
          badges
        retention-days: 1

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      if: runner.os == 'Windows'
      with:
        name: "cardano-address-${{ matrix.ghc }}-${{ matrix.sys.os }}"
        path: '**/cardano-address.exe'
        retention-days: 1

    - name: Preparing Linux/Macos artifact
      if: runner.os != 'Windows'
      env:
        artifactFile: "cardano-address-${{ matrix.ghc }}-${{ matrix.sys.os }}"
        artifactName: "cardano-address.tar.gz"
      run: |
        mkdir -p artifacts

        for exe in $(cat dist-newstyle/cache/plan.json | jq -r '."install-plan"[] | select(.style == "local" and (."component-name" | startswith("exe:"))) | ."bin-file"'); do
          if [ -f "$exe" ]; then
            echo "Including artifact $exe"
            cp "$exe" artifacts/
          else
            echo "Skipping artifact $exe"
          fi
        done

        ls -la artifacts/

        if [ -f "artifacts/cardano-address" ]; then
          ( cd artifacts && tar -czf "${{ env.artifactName }}" cardano-address )
          echo "Created ${{ env.artifactName }}"
          ls -la artifacts/
        else
          echo "ERROR: No cardano-address executable found for artifact"
          exit 1
        fi

        echo "artifactPath=artifacts/" >> $GITHUB_ENV
        echo "artifactFile=${{ env.artifactFile }}" >> $GITHUB_ENV

    - name: Upload Linux/Macos artifact
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: "${{ env.artifactFile }}"
        path: artifacts/${{ env.artifactName }}
        retention-days: 1

  release:
    name: "Release"
    if: ${{ startsWith(github.ref, 'refs/tags') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4

    - name: Setting Release variables
      run: |
        echo "release-ghc=9.6" >> $GITHUB_ENV
        echo "release-ghc-exact=9.6.7" >> $GITHUB_ENV
        release_tag="${GITHUB_REF#refs/tags/}"
        echo "release-tag=$release_tag" >> $GITHUB_ENV

    - uses: actions/download-artifact@v4

    - name: Pick artifacts to publish and change names
      run: |
        echo "=== Downloaded artifacts ==="
        ls -la
        find . -maxdepth 2 -type f | head -30

        sha256sums_filename="cardano-address-${{ env.release-tag }}-sha256sums.txt"

        windows_dir="cardano-address-${{ env.release-ghc }}-windows-latest"
        windows_exe=$(find "$windows_dir" -name "cardano-address.exe" | head -1)
        if [ -z "$windows_exe" ]; then
          echo "ERROR: cardano-address.exe not found in $windows_dir"
          find "$windows_dir" -type f | head -20 || true
          exit 1
        fi
        echo "Found Windows exe: $windows_exe"
        zip cardano-address-${{ env.release-tag }}-win64.zip "$windows_exe"

        macos_dir="cardano-address-${{ env.release-ghc }}-macos-latest"
        linux_dir="cardano-address-${{ env.release-ghc }}-ubuntu-latest"

        if [ ! -f "$macos_dir/cardano-address.tar.gz" ]; then
          echo "ERROR: $macos_dir/cardano-address.tar.gz not found"
          ls -la "$macos_dir/" || true
          exit 1
        fi
        if [ ! -f "$linux_dir/cardano-address.tar.gz" ]; then
          echo "ERROR: $linux_dir/cardano-address.tar.gz not found"
          ls -la "$linux_dir/" || true
          exit 1
        fi

        mv "$macos_dir/cardano-address.tar.gz" cardano-address-${{ env.release-tag }}-macos.tar.gz
        mv "$linux_dir/cardano-address.tar.gz" cardano-address-${{ env.release-tag }}-linux.tar.gz

        echo "=== Artifacts prepared ==="
        ls -lh cardano-address-${{ env.release-tag }}-win64.zip cardano-address-${{ env.release-tag }}-macos.tar.gz cardano-address-${{ env.release-tag }}-linux.tar.gz

        sha256sum cardano-address-${{ env.release-tag }}-win64.zip cardano-address-${{ env.release-tag }}-macos.tar.gz cardano-address-${{ env.release-tag }}-linux.tar.gz > "$sha256sums_filename"
        echo "=== SHA256 checksums ==="
        cat "$sha256sums_filename"

    - name: Prepare release body
      shell: bash
      run: |
        cat <<EOF >bodyConst.txt
        ## Supported Platforms

        - Linux 64-bit
        - Windows 64-bit
        - Macos 64-bit

        ## Signatures

        Name                           | Role                | Approval
        ---                            | ---                 | ---:
        Pawel Jakubas @paweljakubas        | Senior Software Engineer |          
        EOF
        
        awk -v tag="${{ env.release-tag }}" '
          $0 ~ "^## \\[" tag "\\]" {found=1; next}
          /^## \[/ {found=0}
          found {print}
        ' ${{ github.workspace }}/ChangeLog.md > bodyInfo.txt
        cat bodyInfo.txt > release-body.txt
        cat bodyConst.txt >> release-body.txt

    - name: Draft Release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        body_path: release-body.txt
        files: |
          cardano-address-${{ env.release-tag }}-win64.zip
          cardano-address-${{ env.release-tag }}-macos.tar.gz
          cardano-address-${{ env.release-tag }}-linux.tar.gz
          cardano-address-${{ env.release-tag }}-sha256sums.txt
