name: Deploy Documentation

on:
  workflow_run:
    workflows: [Haskell CI]
    types: [completed]
    branches: [master]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-build:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || (github.event_name == 'pull_request')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Docusaurus dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Download Haddock artifact
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Downloading from run: $RUN_ID"
          if gh run download "$RUN_ID" -n haddock-9.10-ubuntu-latest --dir build/haddock --repo ${{ github.repository }}; then
            echo "Downloaded haddock artifact"
            ls -la build/haddock/
            if [ -d build/haddock/html ]; then
              if [ -d build/haddock/html/cardano-addresses ]; then
                mv build/haddock/html/cardano-addresses/* build/haddock/
                rm -rf build/haddock/html
              fi
            fi
            ls -la build/haddock/
          else
            echo "Haddock artifact not found"
          fi

      - name: Download Coverage artifact
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Downloading from run: $RUN_ID"
          if gh run download "$RUN_ID" -n coverage-9.10-ubuntu-latest --dir build/coverage --repo ${{ github.repository }}; then
            echo "Downloaded coverage artifact"
            if [ -d build/coverage/coverage_html ]; then
              mv build/coverage/coverage_html/* build/coverage/
              rm -rf build/coverage/coverage_html
            fi
            if [ -d build/coverage/badges ]; then
              mv build/coverage/badges/* build/coverage/
              rm -rf build/coverage/badges
            fi
            ls -la build/coverage/
          else
            echo "Coverage artifact not found"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Generate Docusaurus badge
        run: |
          mkdir -p build/coverage/badges
          if [ -f "build/index.html" ]; then
            DOCUSAURUS_BADGE_URL="https://img.shields.io/badge/Docusaurus%20docs-OK-green?style=for-the-badge"
          else
            DOCUSAURUS_BADGE_URL="https://img.shields.io/badge/Docusaurus%20docs-INVALID-red?style=for-the-badge"
          fi
          echo "Docusaurus Badge URL: $DOCUSAURUS_BADGE_URL"
          curl -sL "$DOCUSAURUS_BADGE_URL" -o build/coverage/badges/docusaurus-badge.svg
          mv build/coverage/badges/docusaurus-badge.svg build/coverage/docusaurus-badge.svg

  deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
