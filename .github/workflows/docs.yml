name: Deploy Documentation

on:
  push:
    branches: [ "master" ]
  workflow_run:
    workflows: [Haskell CI, WASM CI]
    types: [completed]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-build:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || (github.event_name == 'pull_request')
      || (github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Docusaurus dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Download Haddock artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            RUN_ID=${{ github.event.workflow_run.id }}
            echo "Downloading from workflow_run trigger: $RUN_ID"
          else
            RUN_ID=$(gh run list -w "Haskell CI" -s success -L 1 --json databaseId --jq '.[0].databaseId')
            echo "Downloading from latest successful Haskell CI run: $RUN_ID"
          fi
          mkdir -p build/haddock_html
          if gh run download "$RUN_ID" -n haddock-9.10-ubuntu-latest --dir build/haddock_html --repo ${{ github.repository }}; then
            echo "Downloaded haddock artifact"
            ls -la build/haddock_html/
            # gh run download extracts to a subdirectory named after the artifact
            if [ -d "build/haddock_html/haddock-9.10-ubuntu-latest" ]; then
              echo "Artifact extracted to subdirectory, adjusting path..."
              mv build/haddock_html/haddock-9.10-ubuntu-latest/* build/haddock_html/
              rm -rf build/haddock_html/haddock-9.10-ubuntu-latest
            fi
            mkdir -p build/haddock
            if [ -d build/haddock_html/html/cardano-addresses ]; then
              mv build/haddock_html/html/cardano-addresses/* build/haddock/
            else
              mv build/haddock_html/html/* build/haddock/
            fi
            rm -rf build/haddock_html
            ls -la build/haddock/
          else
            echo "Haddock artifact not found"
          fi

      - name: Download inspect-address WASM artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            RUN_ID=${{ github.event.workflow_run.id }}
            echo "Downloading from workflow_run trigger: $RUN_ID"
          else
            RUN_ID=$(gh run list -w "WASM CI" -s success -L 1 --json databaseId --jq '.[0].databaseId')
            echo "Downloading from latest successful WASM CI run: $RUN_ID"
          fi
          mkdir -p build/browser
          if gh run download "$RUN_ID" -n inspect-address-wasm --dir build/browser --repo ${{ github.repository }}; then
            echo "Downloaded inspect-address-wasm artifact"
            # gh run download extracts to a subdirectory named after the artifact
            if [ -d "build/browser/inspect-address-wasm" ]; then
              echo "Artifact extracted to subdirectory, moving files..."
              mv build/browser/inspect-address-wasm/* build/browser/
              rm -rf build/browser/inspect-address-wasm
            fi
            echo "build/browser/ contents:"
            ls -la build/browser/
            if [ -f "build/browser/inspect-address.wasm" ]; then
              echo "✓ inspect-address.wasm is in correct location"
            else
              echo "✗ ERROR: inspect-address.wasm not found in build/browser/"
              exit 1
            fi
          else
            echo "inspect-address WASM artifact not found"
          fi

      - name: Copy browser HTML to build
        run: |
          mkdir -p build/browser
          cp browser/index.html build/browser/
          ls -la build/browser/

      - name: Download Coverage artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            RUN_ID=${{ github.event.workflow_run.id }}
            echo "Downloading from workflow_run trigger: $RUN_ID"
          else
            RUN_ID=$(gh run list -w "Haskell CI" -s success -L 1 --json databaseId --jq '.[0].databaseId')
            echo "Downloading from latest successful Haskell CI run: $RUN_ID"
          fi
          mkdir -p build/coverage
          if gh run download "$RUN_ID" -n coverage-9.10-ubuntu-latest --dir build/coverage --repo ${{ github.repository }}; then
            echo "Downloaded coverage artifact"
            # gh run download extracts to a subdirectory named after the artifact
            if [ -d "build/coverage/coverage-9.10-ubuntu-latest" ]; then
              echo "Artifact extracted to subdirectory, adjusting path..."
              mv build/coverage/coverage-9.10-ubuntu-latest/* build/coverage/
              rm -rf build/coverage/coverage-9.10-ubuntu-latest
            fi
            if [ -d build/coverage/coverage_html ]; then
              if [ -f build/coverage/coverage_html/hpc_index.html ]; then
                mv build/coverage/coverage_html/hpc_index.html build/
              else
                echo "hpc_index.html not found in coverage artifact"
              fi
            else
              echo "coverage_html directory not found in coverage artifact"
            fi
            if [ -d build/coverage/badges ]; then
              mkdir -p build/badges
              mv build/coverage/badges/* build/badges/
              rm -rf build/coverage/badges
            fi
            rm -rf build/coverage
            ls -la build/badges/
          else
            echo "Coverage artifact not found"
          fi

      - name: Generate Docusaurus badge
        run: |
          mkdir -p build/badges
          if [ -f "build/index.html" ]; then
            DOCUSAURUS_BADGE_URL="https://img.shields.io/badge/Docusaurus%20docs-OK-green?style=for-the-badge"
          else
            DOCUSAURUS_BADGE_URL="https://img.shields.io/badge/Docusaurus%20docs-INVALID-red?style=for-the-badge"
          fi
          echo "Docusaurus Badge URL: $DOCUSAURUS_BADGE_URL"
          curl -sL "$DOCUSAURUS_BADGE_URL" -o build/badges/docusaurus-badge.svg

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run'
      || github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
